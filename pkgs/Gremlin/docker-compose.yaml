services:
  janusgraph:
    image: janusgraph/janusgraph:latest
    container_name: authed-janusgraph
    expose:
      - "8182"
    volumes:
      - ./config/janusgraph/server.yaml:/opt/janusgraph/conf/janusgraph-server.yaml:ro
      - ./config/janusgraph/mimis.properties:/etc/opt/janusgraph/mimis.properties:ro
      - ./config/janusgraph/credentials.properties:/etc/opt/janusgraph/credentials.properties:ro
      - janusgraph-data:/var/lib/janusgraph
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false
    environment:
      - JANUS_PROPS_TEMPLATE=berkeleyje-lucene
      - gremlinserver.graphs.graph=/etc/opt/janusgraph/mimis.properties
      - janusgraph.graph.replace-instance-if-exists=true
    healthcheck:
      test: ["CMD-SHELL", "bin/gremlin.sh -e scripts/remote-connect.groovy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  caddy:
    image: caddy:latest
    container_name: mimis-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    depends_on:
      janusgraph:
        condition: service_healthy

volumes:
  janusgraph-data:
  caddy-data:
