services:
  janusgraph:
    ports: !reset []

  caddy:
    image: caddy:latest
    container_name: mimis-caddy
    restart: unless-stopped
    ports:
      - "88:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    depends_on:
      janusgraph:
        condition: service_healthy

volumes:
  caddy-data:
