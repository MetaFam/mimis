services:
  janusgraph:
    ports: !reset []
    env_file:
      - path: .env
        required: false
      - path: .env.local
        required: false

  caddy:
    image: caddy:latest
    container_name: mimis-caddy
    restart: unless-stopped
    ports:
      - "88:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
      - "8183:8183"
    volumes:
      - ./config/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    depends_on:
      janusgraph:
        condition: service_healthy

volumes:
  caddy-data:
